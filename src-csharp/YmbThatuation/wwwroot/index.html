<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>sidebar</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg-page, #1e1f24);
    font-family: "Segoe UI", sans-serif;
    user-select: none;
    overflow: hidden;
  }
  /* サイドバー幅(GridSplitterで可変)に応じてアイコンサイズを追従させる */
  :root {
    --svc-size: min(64px, max(40px, 70vw));
  }
  #bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    height: 100%;
    box-sizing: border-box;
  }
  #services {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
    overflow-y: auto;
    width: 100%;
    padding-top: 6px;
  }
  #services::-webkit-scrollbar { width: 0; }
  .svc {
    width: var(--svc-size);
    height: var(--svc-size);
    min-height: var(--svc-size);
    border-radius: 10px;
    border: 2px solid transparent;
    background: var(--bg-chip, #33353d);
    color: var(--text-secondary, #c9cad1);
    font-size: calc(var(--svc-size) * 0.34);
    font-weight: 600;
    cursor: pointer;
    position: relative;
  }
  .svc:hover { background: var(--bg-chip-hover, #41434d); }
  .svc.active {
    border: 2px solid transparent;
    background: var(--accent-soft, #2c3a55);
    color: #fff;
  }
  /* アクティブな枠のスタイル。data-ring-styleで切替(既定: rainbow)。 */
  .svc .ring { display: none; }
  .svc.active .ring {
    display: block;
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 2px;
    box-sizing: border-box;
    overflow: hidden;
    pointer-events: none;
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    background: conic-gradient(
      from 0deg,
      hsl(0, 100%, 65%),
      hsl(30, 100%, 65%),
      hsl(60, 100%, 65%),
      hsl(90, 100%, 65%),
      hsl(120, 100%, 65%),
      hsl(150, 100%, 65%),
      hsl(180, 100%, 65%),
      hsl(210, 100%, 65%),
      hsl(240, 100%, 65%),
      hsl(270, 100%, 65%),
      hsl(300, 100%, 65%),
      hsl(330, 100%, 65%),
      hsl(360, 100%, 65%)
    );
  }
  html[data-ring-style="solid"] .svc.active .ring {
    background: var(--accent, #3a5bbf);
  }
  html[data-ring-style="gradient"] .svc.active .ring {
    background: linear-gradient(135deg, var(--accent, #3a5bbf), var(--success, #7fd0a0));
  }
  html[data-ring-style="none"] .svc.active .ring {
    display: none;
  }
  html[data-ring-style="warm"] .svc.active .ring {
    background: linear-gradient(135deg, #ff8a3d, #ff5b8d);
  }
  html[data-ring-style="cool"] .svc.active .ring {
    background: linear-gradient(135deg, #3da8ff, #3dffd8);
  }
  html[data-ring-style="sunset"] .svc.active .ring {
    background: linear-gradient(135deg, #7b3dff, #ff8a3d 50%, #ffd83d);
  }
  /* glow/dashed/doubleは枠用maskを使わず、ボタン自体のborder/box-shadowで表現する。 */
  html[data-ring-style="glow"] .svc.active .ring,
  html[data-ring-style="dashed"] .svc.active .ring,
  html[data-ring-style="double"] .svc.active .ring {
    display: none;
  }
  html[data-ring-style="glow"] .svc.active {
    border-color: var(--accent, #3a5bbf);
    box-shadow: 0 0 8px 2px var(--accent, #3a5bbf);
  }
  html[data-ring-style="dashed"] .svc.active {
    border-style: dashed;
    border-color: var(--accent, #3a5bbf);
  }
  html[data-ring-style="double"] .svc.active {
    border-color: transparent;
    box-shadow:
      0 0 0 2px var(--accent, #3a5bbf),
      0 0 0 4px var(--bg-page, #1e1f24),
      0 0 0 6px var(--accent, #3a5bbf);
  }
  .svc.asleep {
    opacity: 0.45;
    filter: grayscale(0.9);
  }
  .svc.asleep.active { opacity: 0.7; }
  .svc .icon {
    width: calc(var(--svc-size) * 0.6);
    height: calc(var(--svc-size) * 0.6);
    object-fit: contain;
    pointer-events: none;
  }
  .svc .badge {
    display: none;
    position: absolute;
    top: -2px;
    right: -2px;
    width: 10px;
    height: 10px;
    background: var(--danger, #e05d5d);
    border-radius: 50%;
    border: 2px solid var(--bg-page, #1e1f24);
  }
  .tool {
    width: var(--svc-size);
    height: var(--svc-size);
    min-height: var(--svc-size);
    border-radius: 10px;
    border: none;
    background: var(--bg-chip, #33353d);
    color: var(--text-muted, #8a8c94);
    font-size: calc(var(--svc-size) * 0.34);
    cursor: pointer;
  }
  .tool:hover { background: var(--bg-chip-hover, #41434d); color: #fff; }
  #status {
    font-size: 10px;
    color: var(--danger, #e05d5d);
    text-align: center;
    word-break: break-all;
    max-width: var(--svc-size);
  }
</style>
</head>
<body>
<div id="bar">
  <div id="services"></div>
  <div id="status"></div>
  <button class="tool" id="downloads" data-i18n-title="sidebar.downloads" title="ダウンロードフォルダを開く">⬇</button>
  <button class="tool" id="settings" data-i18n-title="sidebar.settings" title="設定">⚙</button>
</div>
<script src="theme.js"></script>
<script src="i18n.js"></script>
<script>
  const statusEl = document.getElementById("status");
  const invoke = (cmd, args) =>
    window.chrome.webview.hostObjects.ymb
      .InvokeAsync(cmd, JSON.stringify(args ?? {}))
      .then((r) => {
        const parsed = JSON.parse(r);
        if (parsed && typeof parsed === "object" && "__error__" in parsed) {
          throw new Error(parsed.__error__);
        }
        return parsed;
      });

  const servicesEl = document.getElementById("services");
  const buttons = new Map();

  function showError(e) {
    statusEl.textContent = String(e);
    setTimeout(() => { statusEl.textContent = ""; }, 8000);
  }

  function syncButton(inst) {
    let btn = buttons.get(inst.id);
    if (!btn) {
      btn = document.createElement("button");
      btn.className = "svc";
      btn.innerHTML =
        '<span class="ring"></span><img class="icon" alt="" style="display:none" /><span class="letter" style="display:none"></span><span class="badge" style="display:none"></span>';
      // スリープ中のサービスは選択のみ行い、起動は待機画面側のボタンから行う
      btn.addEventListener("click", async () => {
        try {
          await invoke("select_instance", { id: inst.id });
        } catch (e) {
          showError(e);
        }
        refresh();
      });
      btn.addEventListener("contextmenu", (ev) => {
        ev.preventDefault();
        showContextMenu(ev.clientX, ev.clientY, btn._inst);
      });
      // カスタムアイコン > レシピ用アイコンSVG > 頭文字 の優先順でフォールバック
      const img = btn.querySelector(".icon");
      const letter = btn.querySelector(".letter");
      img.onerror = () => {
        img.style.display = "none";
        letter.style.display = "";
      };
      img.onload = () => {
        img.style.display = "";
        letter.style.display = "none";
      };
      letter.textContent = inst.letter;
      buttons.set(inst.id, btn);
      servicesEl.appendChild(btn);
    }
    btn._inst = inst;
    const img = btn.querySelector(".icon");
    const wantedSrc = inst.custom_icon || `icons/${inst.recipe}.svg`;
    if (img.dataset.src !== wantedSrc) {
      img.dataset.src = wantedSrc;
      img.src = wantedSrc;
    }
    btn.title = inst.alive
      ? inst.name
      : `${inst.name} ${window.t ? window.t("sidebar.asleep_suffix") : "(スリープ中)"}`;
    const badge = btn.querySelector(".badge");
    badge.style.display = inst.unread > 0 ? "" : "none";
    btn.classList.toggle("active", inst.active);
    btn.classList.toggle("asleep", !inst.alive);
    return btn;
  }

  async function refresh() {
    if (!invoke) return;
    try {
      const list = await invoke("ui_state");
      const ids = new Set(list.map((i) => i.id));
      for (const [id, btn] of buttons) {
        if (!ids.has(id)) {
          btn.remove();
          buttons.delete(id);
        }
      }
      for (const inst of list) {
        syncButton(inst);
      }
      // 並び順をconfigに合わせる
      list.forEach((inst) => servicesEl.appendChild(buttons.get(inst.id)));
    } catch (e) {
      showError(e);
    }
  }

  function showContextMenu(x, y, inst) {
    if (!inst) return;
    invoke("show_context_menu", { id: inst.id, alive: inst.alive, x, y }).catch(showError);
  }
  document.addEventListener("click", () => {
    invoke("close_context_menu").catch(() => {});
  });

  // アプリアイコンの独自右クリックメニュー以外では既定のWebコンテキストメニューを出さない
  document.addEventListener("contextmenu", (ev) => {
    ev.preventDefault();
  });

  document.getElementById("downloads").addEventListener("click", async () => {
    try {
      await invoke("open_downloads_dir");
    } catch (e) {
      showError(e);
    }
  });

  document.addEventListener("keydown", (ev) => {
    if (!ev.ctrlKey || ev.altKey || ev.metaKey) return;
    const n = parseInt(ev.key, 10);
    if (n >= 1 && n <= 9) {
      invoke("select_instance_by_index", { index: n }).then(refresh).catch(() => {});
    }
  });

  async function applyAppearance() {
    try {
      const cfg = await invoke("get_config");
      window.ymbTheme.applyTheme(cfg.settings.theme);
      window.ymbTheme.applyRingStyle(cfg.settings.active_ring_style);
    } catch (e) {
      // 無視(既定テーマのまま)
    }
  }
  applyAppearance();
  setInterval(applyAppearance, 2000);

  document.getElementById("settings").addEventListener("click", async () => {
    try {
      await invoke("open_settings", { editId: null });
    } catch (e) {
      showError(e);
    }
    refresh();
  });

  refresh();
  setInterval(refresh, 1500);
</script>
</body>
</html>
