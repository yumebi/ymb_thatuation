<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>sidebar</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #1e1f24;
    font-family: "Segoe UI", sans-serif;
    user-select: none;
    overflow: hidden;
  }
  #bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    height: 100%;
    box-sizing: border-box;
  }
  #services {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
    overflow-y: auto;
    width: 100%;
    padding-top: 6px;
  }
  #services::-webkit-scrollbar { width: 0; }
  .svc {
    width: 44px;
    height: 44px;
    min-height: 44px;
    border-radius: 10px;
    border: 2px solid transparent;
    background: #33353d;
    color: #c9cad1;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
  }
  .svc:hover { background: #41434d; }
  .svc.active {
    border: 2px solid transparent;
    background: #2c3a55;
    color: #fff;
  }
  /* 虹色の枠。アニメーションなしの静止表示。2px帯のマスクで
     conic-gradientを枠状にクリップする。 */
  .svc .ring { display: none; }
  .svc.active .ring {
    display: block;
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 2px;
    box-sizing: border-box;
    overflow: hidden;
    pointer-events: none;
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    background: conic-gradient(
      from 0deg,
      hsl(0, 100%, 65%),
      hsl(30, 100%, 65%),
      hsl(60, 100%, 65%),
      hsl(90, 100%, 65%),
      hsl(120, 100%, 65%),
      hsl(150, 100%, 65%),
      hsl(180, 100%, 65%),
      hsl(210, 100%, 65%),
      hsl(240, 100%, 65%),
      hsl(270, 100%, 65%),
      hsl(300, 100%, 65%),
      hsl(330, 100%, 65%),
      hsl(360, 100%, 65%)
    );
  }
  .svc.asleep {
    opacity: 0.45;
    filter: grayscale(0.9);
  }
  .svc.asleep.active { opacity: 0.7; }
  .svc .icon {
    width: 26px;
    height: 26px;
    object-fit: contain;
    pointer-events: none;
  }
  .svc .dot {
    position: absolute;
    bottom: 3px;
    right: 5px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    border: 1.5px solid #1e1f24;
  }
  .svc .badge {
    position: absolute;
    top: -6px;
    right: -6px;
    background: #e05d5d;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    border-radius: 9px;
    min-width: 12px;
    padding: 2px 4px;
    line-height: 1;
  }
  .tool {
    width: 44px;
    height: 32px;
    min-height: 32px;
    border-radius: 8px;
    border: none;
    background: #33353d;
    color: #8a8c94;
    font-size: 13px;
    cursor: pointer;
  }
  .tool:hover { background: #41434d; color: #fff; }
  #status {
    font-size: 10px;
    color: #e05d5d;
    text-align: center;
    word-break: break-all;
    max-width: 60px;
  }
</style>
</head>
<body>
<div id="bar">
  <div id="services"></div>
  <div id="status"></div>
  <button class="tool" id="settings" data-i18n-title="sidebar.settings" title="設定">⚙</button>
</div>
<script src="i18n.js"></script>
<script>
  const statusEl = document.getElementById("status");
  // add_childで追加した子WebViewにはwithGlobalTauriが注入されない既知問題があるため
  // 常に注入される__TAURI_INTERNALS__にフォールバックする
  const invoke =
    window.__TAURI__?.core?.invoke ??
    (window.__TAURI_INTERNALS__
      ? (cmd, args) => window.__TAURI_INTERNALS__.invoke(cmd, args)
      : null);
  if (!invoke) statusEl.textContent = "IPC無効";

  const servicesEl = document.getElementById("services");
  const buttons = new Map();

  function showError(e) {
    statusEl.textContent = String(e);
    setTimeout(() => { statusEl.textContent = ""; }, 8000);
  }

  function syncButton(inst) {
    let btn = buttons.get(inst.id);
    if (!btn) {
      btn = document.createElement("button");
      btn.className = "svc";
      btn.innerHTML =
        '<span class="ring"></span><img class="icon" alt="" style="display:none" /><span class="letter" style="display:none"></span><span class="dot"></span><span class="badge" style="display:none"></span>';
      // スリープ中のサービスは選択のみ行い、起動は待機画面側のボタンから行う
      btn.addEventListener("click", async () => {
        try {
          await invoke("select_instance", { id: inst.id });
        } catch (e) {
          showError(e);
        }
        refresh();
      });
      btn.addEventListener("contextmenu", (ev) => {
        ev.preventDefault();
        showContextMenu(ev.clientX, ev.clientY, btn._inst);
      });
      // カスタムアイコン > レシピ用アイコンSVG > 頭文字 の優先順でフォールバック
      const img = btn.querySelector(".icon");
      const letter = btn.querySelector(".letter");
      img.onerror = () => {
        img.style.display = "none";
        letter.style.display = "";
      };
      img.onload = () => {
        img.style.display = "";
        letter.style.display = "none";
      };
      letter.textContent = inst.letter;
      buttons.set(inst.id, btn);
      servicesEl.appendChild(btn);
    }
    btn._inst = inst;
    const img = btn.querySelector(".icon");
    const wantedSrc = inst.custom_icon || `icons/${inst.recipe}.svg`;
    if (img.dataset.src !== wantedSrc) {
      img.dataset.src = wantedSrc;
      img.src = wantedSrc;
    }
    btn.title = inst.alive
      ? `${inst.name} — ${inst.mem_mb} MB`
      : `${inst.name} ${window.t ? window.t("sidebar.asleep_suffix") : "(スリープ中)"}`;
    btn.querySelector(".dot").style.background = inst.color;
    const badge = btn.querySelector(".badge");
    if (inst.unread > 0) {
      badge.textContent = inst.unread > 99 ? "99+" : inst.unread;
      badge.style.display = "";
    } else {
      badge.style.display = "none";
    }
    btn.classList.toggle("active", inst.active);
    btn.classList.toggle("asleep", !inst.alive);
    return btn;
  }

  async function refresh() {
    if (!invoke) return;
    try {
      const list = await invoke("ui_state");
      const ids = new Set(list.map((i) => i.id));
      for (const [id, btn] of buttons) {
        if (!ids.has(id)) {
          btn.remove();
          buttons.delete(id);
        }
      }
      for (const inst of list) {
        syncButton(inst);
      }
      // 並び順をconfigに合わせる
      list.forEach((inst) => servicesEl.appendChild(buttons.get(inst.id)));
    } catch (e) {
      showError(e);
    }
  }

  function showContextMenu(x, y, inst) {
    if (!inst) return;
    invoke("show_context_menu", { id: inst.id, alive: inst.alive, x, y }).catch(showError);
  }
  document.addEventListener("click", () => {
    invoke("close_context_menu").catch(() => {});
  });

  // アプリアイコンの独自右クリックメニュー以外では既定のWebコンテキストメニューを出さない
  document.addEventListener("contextmenu", (ev) => {
    ev.preventDefault();
  });

  document.getElementById("settings").addEventListener("click", async () => {
    try {
      await invoke("open_settings", { editId: null });
    } catch (e) {
      showError(e);
    }
    refresh();
  });

  refresh();
  setInterval(refresh, 1500);
</script>
</body>
</html>
